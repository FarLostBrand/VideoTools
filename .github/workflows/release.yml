name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      # ── Download and Inject Sidecar Binaries ──────────────────────────
      - name: Create sidecars directory
        run: mkdir -p src-tauri/binaries

      - name: Setup Windows Sidecars
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          # Download static ffmpeg build for Windows
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          unzip ffmpeg.zip
          
          # Find the extracted directories and move binaries with target triple
          FFMPEG_DIR=$(find . -maxdepth 1 -type d -name "ffmpeg-*" | head -n 1)
          mv "$FFMPEG_DIR/bin/ffmpeg.exe" src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          mv "$FFMPEG_DIR/bin/ffprobe.exe" src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - name: Setup macOS Sidecars
        if: matrix.platform == 'macos-latest'
        run: |
          # Download architecture-specific binaries for Apple Silicon (aarch64) and Intel (x86_64)
          # Evermeet.cx provides standalone static binaries for macOS
          
          # 1. Intel (x86_64) Sidecars
          curl -L -o ffmpeg_intel.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/snapshot/ffmpeg.zip"
          curl -L -o ffprobe_intel.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/snapshot/ffprobe.zip"
          unzip -o ffmpeg_intel.zip -d intel_bin
          unzip -o ffprobe_intel.zip -d intel_bin
          mv intel_bin/ffmpeg src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          mv intel_bin/ffprobe src-tauri/binaries/ffprobe-x86_64-apple-darwin
          
          # 2. Apple Silicon (aarch64) Sidecars
          curl -L -o ffmpeg_arm.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/snapshot/ffmpeg.zip"
          curl -L -o ffprobe_arm.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/snapshot/ffprobe.zip"
          unzip -o ffmpeg_arm.zip -d arm_bin
          unzip -o ffprobe_arm.zip -d arm_bin
          mv arm_bin/ffmpeg src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          mv arm_bin/ffprobe src-tauri/binaries/ffprobe-aarch64-apple-darwin
          
          chmod +x src-tauri/binaries/*

      - name: Setup Linux Sidecars
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # Download static release for x86_64 Linux (John Van Sickle builds)
          curl -L -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          
          FFMPEG_DIR=$(find . -maxdepth 1 -type d -name "ffmpeg-*-amd64-static" | head -n 1)
          mv "$FFMPEG_DIR/ffmpeg" src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          mv "$FFMPEG_DIR/ffprobe" src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/*

      # ── Build and release ─────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VideoTools ${{ github.ref_name }}'
          releaseBody: |
            ## Installation
            - **Linux**: Download the `.AppImage` or `.rpm` / `.deb`
            - **macOS**: Download the `.dmg` (universal — works on both Apple Silicon and Intel)
            - **Windows**: Download the `.msi` or `.exe`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  updater:
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Sign artifacts and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          BASE="https://github.com/FarLostBrand/VideoTools/releases/download/${TAG}"

          echo "Downloading artifacts..."
          curl -sL "${BASE}/VideoTools_${VERSION}_amd64.AppImage.tar.gz" -o linux.tar.gz
          curl -sL "${BASE}/VideoTools_universal.app.tar.gz" -o macos.tar.gz
          curl -sL "${BASE}/VideoTools_${VERSION}_x64-setup.exe" -o windows.exe

          echo "Signing artifacts..."
          TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
          npx tauri signer sign linux.tar.gz

          TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
          npx tauri signer sign macos.tar.gz

          TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
          npx tauri signer sign windows.exe

          LINUX_SIG=$(cat linux.tar.gz.sig)
          MACOS_SIG=$(cat macos.tar.gz.sig)
          WIN_SIG=$(cat windows.exe.sig)

          # Generate latest.json with all platform key variants Tauri v2 may look for
          python3 << PYEOF
          import json
          macos = {
            "signature": """${MACOS_SIG}""",
            "url": "${BASE}/VideoTools_universal.app.tar.gz"
          }
          windows = {
            "signature": """${WIN_SIG}""",
            "url": "${BASE}/VideoTools_${VERSION}_x64-setup.exe"
          }
          linux = {
            "signature": """${LINUX_SIG}""",
            "url": "${BASE}/VideoTools_${VERSION}_amd64.AppImage.tar.gz"
          }
          data = {
            "version": "${VERSION}",
            "notes": "See https://github.com/FarLostBrand/VideoTools/releases/tag/${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64":     linux,
              "darwin-universal": macos,
              "darwin-aarch64":   macos,
              "darwin-x86_64":    macos,
              "windows-x86_64":   windows,
              "windows-i686":     windows
            }
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print("Generated latest.json:")
          print(json.dumps(data, indent=2))
          PYEOF

      - name: Commit latest.json to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: update latest.json for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" latest.json --clobber
