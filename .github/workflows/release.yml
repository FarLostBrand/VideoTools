name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VideoTools ${{ github.ref_name }}'
          releaseBody: |
            ## Installation
            - **Linux**: Download the `.AppImage` or `.rpm` / `.deb`
            - **macOS**: Download the `.dmg`
            - **Windows**: Download the `.msi` or `.exe`
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

  # Separate job that runs after all platform builds finish
  # Generates and uploads latest.json for the in-app updater
  updater:
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps (for @tauri-apps/cli)
        run: npm install

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          BASE="https://github.com/FarLostBrand/VideoTools/releases/download/${TAG}"

          # Download .sig files generated by tauri-action
          curl -sL "${BASE}/VideoTools_${VERSION}_amd64.AppImage.tar.gz.sig" -o linux.sig
          curl -sL "${BASE}/VideoTools_universal.app.tar.gz.sig" -o macos.sig
          curl -sL "${BASE}/VideoTools_${VERSION}_x64-setup.exe.sig" -o windows.sig

          LINUX_SIG=$(cat linux.sig)
          MACOS_SIG=$(cat macos.sig)
          WIN_SIG=$(cat windows.sig)

          cat > latest.json << JSONEOF
          {
            "version": "${VERSION}",
            "notes": "See release notes at https://github.com/FarLostBrand/VideoTools/releases/tag/${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE}/VideoTools_${VERSION}_amd64.AppImage.tar.gz"
              },
              "darwin-universal": {
                "signature": "${MACOS_SIG}",
                "url": "${BASE}/VideoTools_universal.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE}/VideoTools_${VERSION}_x64-setup.exe"
              }
            }
          }
          JSONEOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          gh release upload "${TAG}" latest.json --clobber
