name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VideoTools ${{ github.ref_name }}'
          releaseBody: |
            ## Installation
            - **Linux**: Download the `.AppImage` or `.rpm` / `.deb`
            - **macOS**: Download the `.dmg` (universal — works on both Apple Silicon and Intel)
            - **Windows**: Download the `.msi` or `.exe`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  updater:
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Sign artifacts and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          BASE="https://github.com/FarLostBrand/VideoTools/releases/download/${TAG}"

          echo "Downloading artifacts..."
          curl -sL "${BASE}/VideoTools_${VERSION}_amd64.AppImage.tar.gz" -o linux.tar.gz
          curl -sL "${BASE}/VideoTools_universal.app.tar.gz" -o macos.tar.gz
          curl -sL "${BASE}/VideoTools_${VERSION}_x64-setup.exe" -o windows.exe

          echo "Signing artifacts..."
          TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
          npx tauri signer sign linux.tar.gz

          TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
          npx tauri signer sign macos.tar.gz

          TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
          npx tauri signer sign windows.exe

          LINUX_SIG=$(cat linux.tar.gz.sig)
          MACOS_SIG=$(cat macos.tar.gz.sig)
          WIN_SIG=$(cat windows.exe.sig)

          # Generate latest.json with all platform key variants Tauri v2 may look for
          python3 << PYEOF
          import json
          macos = {
            "signature": """${MACOS_SIG}""",
            "url": "${BASE}/VideoTools_universal.app.tar.gz"
          }
          windows = {
            "signature": """${WIN_SIG}""",
            "url": "${BASE}/VideoTools_${VERSION}_x64-setup.exe"
          }
          linux = {
            "signature": """${LINUX_SIG}""",
            "url": "${BASE}/VideoTools_${VERSION}_amd64.AppImage.tar.gz"
          }
          data = {
            "version": "${VERSION}",
            "notes": "See https://github.com/FarLostBrand/VideoTools/releases/tag/${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64":     linux,
              "darwin-universal": macos,
              "darwin-aarch64":   macos,
              "darwin-x86_64":    macos,
              "windows-x86_64":   windows,
              "windows-i686":     windows
            }
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print("Generated latest.json:")
          print(json.dumps(data, indent=2))
          PYEOF

      - name: Commit latest.json to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: update latest.json for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" latest.json --clobber
